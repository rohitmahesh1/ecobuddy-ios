<svg width="1200" height="640" viewBox="0 0 1200 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="640" rx="36" fill="#F4FBF7"/>
  <rect x="0" y="0" width="1200" height="640" rx="36" fill="url(#bg)"/>
  <circle cx="1040" cy="92" r="96" fill="#DFF7EE"/>
